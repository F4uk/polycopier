# polycopier config -- safe to version control (no secrets here)
# Secrets (PRIVATE_KEY, FUNDER_ADDRESS) stay in .env
#
# This file is auto-generated on first run if it doesn't exist.
# Edit directly or use the [s] settings editor inside the TUI.

[targets]
# Polymarket proxy wallet addresses to copy-trade.
# Add one or more addresses as a TOML array.
# (Optional) append `:scalar` to proportionally drop their sizing in target_scalar mode!
wallets = [
  "0xTargetWalletAddress1Here",
  # "0xOptionalSecondWallet:0.01",
]

[execution]
# Slippage buffer applied to copied trade price for limit orders (2% = 0.02)
max_slippage_pct = 0.02
# Hard ceiling per copied trade in USD -- overrides sizing calculation
max_trade_size_usd = 10.00
# Drop listener events older than N seconds (staleness filter)
max_delay_seconds = 10
# SELL size = held_size x sell_fee_buffer (absorbs CLOB fee, default 0.97 ~ 3%)
sell_fee_buffer = 0.97

[sizing]
# Sizing algorithm: "self_pct" | "target_usd" | "target_scalar" | "fixed"
#   self_pct      -- spend copy_size_pct% of YOUR balance per trade
#   target_usd    -- mirror the target's exact USD notional (capped at max_trade_size_usd)
#   target_scalar -- scale their bet multiplier (e.g. 0.01 = 1% of their $500 = $5 sized order)
#   fixed         -- always spend exactly max_trade_size_usd
mode = "self_pct"
# Fraction of our balance to use per trade for self_pct mode (0.15 = 15%)
copy_size_pct = 0.15

[scanner]
# Skip catch-up position if target is already this % underwater (0.40 = 40%)
max_copy_loss_pct = 0.40
# Skip catch-up if target already this % in profit -- prevents chasing (0.05 = 5%)
max_copy_gain_pct = 0.05
# Minimum token price for catch-up entries (filters near-zero dust)
min_entry_price = 0.02
# Maximum token price for catch-up entries
max_entry_price = 0.999
# Max positions queued per scan cycle -- raise to 2-3 if you miss many entries
max_entries_per_cycle = 1

[risk]
# Max USD traded per UTC day (BUY + SELL combined). 0 = disabled.
max_daily_volume_usd = 0
# Consecutive losses before triggering a cooldown pause. 0 = disabled.
max_consecutive_losses = 0
# Seconds to pause after hitting max_consecutive_losses. Default 300 (5 min).
loss_cooldown_secs = 300

[ledger]
# Days to retain closed trade ledger entries. 0 = never prune.
retention_days = 90

[stop_loss]
# Enable local stop-loss / take-profit monitoring
enabled = true
# Force stop-loss: exit immediately if price drops below this (0.15 = $0.15)
force_stop_price = 0.15
# Force take-profit: exit immediately if price rises above this (0.95 = $0.95)
force_close_price = 0.95
# Check interval (seconds)
check_interval_secs = 3

[stop_loss_tiers]
# ── Dynamic tiered stop-loss / trailing take-profit ──────────────────────────
# Configures per-entry-price-tier SL/TP parameters.
# Each tier activates based on entry price: < tier1_max_entry → tier 1, etc.
# SL tiers advance: Initial → Breakeven (≥20% profit) → Lock 20% (≥50% profit).
# Trailing TP activates when profit ≥ tp_activate_pct, then trails with tp_drawdown_pct.
# Force lines (force_stop_price / force_close_price) always apply regardless of tier.
#
# Tier 1 — Deep underdog entries (< tier1_max_entry, e.g. < $0.40)
tier1_max_entry = 0.40
tier1_initial_sl_pct = 0.20
tier1_tp_activate_pct = 0.80
tier1_drawdown_pct = 0.15
# Tier 2 — Medium underdog entries (< tier2_max_entry, e.g. < $0.55)
tier2_max_entry = 0.55
tier2_initial_sl_pct = 0.15
tier2_tp_activate_pct = 0.60
tier2_drawdown_pct = 0.12
# Tier 3 — Favourite entries (< tier3_max_entry, e.g. < $0.70)
tier3_max_entry = 0.70
tier3_initial_sl_pct = 0.12
tier3_tp_activate_pct = 0.40
tier3_drawdown_pct = 0.10
# Tier 4 — Strong favourite entries (>= tier3_max_entry, e.g. >= $0.70)
tier4_max_entry = 1.00
tier4_initial_sl_pct = 0.10
tier4_tp_activate_pct = 0.25
tier4_drawdown_pct = 0.08

[trading]
# Token ownership strategy: first_come | win_rate_priority | multi_wallet_average | whitelist_only
#   first_come         -- first wallet to BUY owns the token (original behavior)
#   win_rate_priority  -- highest win-rate wallet owns the token
#   multi_wallet_average -- average across all wallets holding the token
#   whitelist_only     -- only copy from whitelisted wallets (wallets with :weight suffix)
token_ownership_strategy = "first_come"
# Enable partial close: when target partially reduces, reduce our position proportionally
enable_partial_close = true
# Local state cache TTL in seconds for our and target wallet positions (lower = fresher, higher = less API calls)
local_cache_ttl_secs = 3
# API timeout threshold in seconds for smart degradation (fallback to local ledger decisions)
api_timeout_degrade_secs = 3

[risk_by_category]
# Enable per-category position limits. When enabled, each market category
# (e.g. "politics.us-election", "economics.fed") has its own max position cap.
enabled = false
# Default max position per category (USDC). Unlisted categories use this.
# Set to 0 to completely disable a category.
default_limit = 20.0
# Example per-category limits (uncomment to use):
# "politics.us-election" = 20.0
# "politics.congress" = 15.0
# "economics.fed" = 10.0
# "sports.tennis" = 0.0  # 0 = fully disabled
